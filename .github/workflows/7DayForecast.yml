name: Update Rabirubia 7-Day Wind & Wave Card

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

concurrency:
  group: rabirubia-forecast
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install canvas node-fetch@2

      - name: Generate Forecast Card
        run: |
          cat > generate.cjs << 'EOF'
          const { createCanvas, loadImage } = require("canvas");
          const fetch = require("node-fetch");
          const fs = require("fs");

          const W = 1080, H = 1080;
          const canvas = createCanvas(W, H);
          const ctx = canvas.getContext("2d");

          // AST = UTC-4
          const now       = new Date();
          const astOffset = -4 * 60 * 60 * 1000;
          // astNow = current wall-clock time in AST
          const astNow    = new Date(now.getTime() + astOffset);

          /* ── helpers ─────────────────────────────────────────── */
          const mean = arr => arr.reduce((a,b) => a+b, 0) / arr.length;

          const circularMean = degs => {
            const rad = degs.map(d => d * Math.PI / 180);
            const ang = Math.atan2(
              rad.reduce((a,v) => a + Math.sin(v), 0),
              rad.reduce((a,v) => a + Math.cos(v), 0)
            ) * 180 / Math.PI;
            return (ang + 360) % 360;
          };

          const compass = deg => {
            const d = ["N","NNE","NE","ENE","E","ESE","SE","SSE",
                       "S","SSW","SW","WSW","W","WNW","NW","NNW"];
            return d[Math.round(deg / 22.5) % 16];
          };

          const windColor = s =>
            s <= 10 ? "#38bdf8" : s <= 15 ? "#22c55e" :
            s <= 20 ? "#eab308" : s <= 25 ? "#f97316" : "#ef4444";

          /* ── unit conversion (reads actual uom from NWS) ─────── */
          function toMph(value, uom) {
            if (value === null || value === undefined) return null;
            const u = (uom || "").toLowerCase();
            if (u.includes("km_h") || u.includes("km/h"))  return Math.round(value * 0.621371);
            if (u.includes("m_s")  || u.includes("m/s"))   return Math.round(value * 2.23694);
            if (u.includes("knot") || u.includes("kt"))    return Math.round(value * 1.15078);
            if (u.includes("mph"))                          return Math.round(value);
            return Math.round(value * 0.621371); // safest default
          }

          /* ── background ──────────────────────────────────────── */
          async function drawBackground() {
            const bg = await loadImage(
              "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1600&q=80"
            );
            ctx.drawImage(bg, 0, 0, W, H);
            ctx.fillStyle = "rgba(248,250,252,0.92)";
            ctx.fillRect(40, 40, W-80, H-80);
          }

          /* ── buoy fetch ──────────────────────────────────────── */
          async function fetchBuoy(id) {
            try {
              const txt = await fetch(
                `https://www.ndbc.noaa.gov/data/realtime2/${id}.txt`
              ).then(r => r.text());
              const lines  = txt.split("\n");
              const header = lines.find(l => l.startsWith("#YY"))
                                  .replace("#","").split(/\s+/);
              const rows   = lines.filter(l => !l.startsWith("#") && l.trim());
              const idx    = n => header.indexOf(n);
              for (const r of rows) {
                const p = r.split(/\s+/);
                if (p[idx("WVHT")] !== "MM") {
                  return {
                    height: (parseFloat(p[idx("WVHT")]) * 3.28084).toFixed(1) + " ft",
                    period: p[idx("DPD")] + " s",
                    dir:    p[idx("MWD")] + "°"
                  };
                }
              }
            } catch(e) { console.error("Buoy", id, "error:", e.message); }
            return null;
          }

          /* ── expand NWS ISO-8601 duration series → hourly ────── */
          function expandSeries(values) {
            const out = [];
            if (!values || !values.length) return out;
            for (const { validTime, value } of values) {
              const slash   = validTime.lastIndexOf("/");
              const timeStr = validTime.slice(0, slash);
              const durStr  = validTime.slice(slash + 1);
              const dt      = new Date(timeStr);
              let hours = 0;
              const dM = durStr.match(/(\d+)D/); if (dM) hours += parseInt(dM[1]) * 24;
              const hM = durStr.match(/(\d+)H/); if (hM) hours += parseInt(hM[1]);
              if (!hours) hours = 1;
              for (let i = 0; i < hours; i++) {
                out.push({ t: new Date(dt.getTime() + i * 3600000), value });
              }
            }
            return out;
          }

          /* ── group hourly → AST calendar date key ────────────── */
          function groupByASTDate(hourly) {
            const map = {};
            for (const { t, value } of hourly) {
              if (value === null || value === undefined || isNaN(Number(value))) continue;
              // FIX 3: shift the UTC timestamp into AST before extracting the date key
              // so that near-midnight UTC hours land on the correct AST calendar date
              const astDate = new Date(t.getTime() + astOffset);
              const key = astDate.toISOString().slice(0, 10); // "YYYY-MM-DD" in AST
              (map[key] = map[key] || []).push(Number(value));
            }
            return map;
          }

          /* ═══════════════════════════════════════════════════════
           *  SOURCE 1 — NWS NDFD gridpoints  (wind / gust / dir)
           *  Fajardo nearshore: 18.3327 N, 65.6516 W
           * ═══════════════════════════════════════════════════════ */
          async function fetchWindForecast() {
            const UA = "RabirubiaTech/1.0 (forecast-card)";
            const ptRes = await fetch(
              "https://api.weather.gov/points/18.3327,-65.6516",
              { headers: { "User-Agent": UA } }
            );
            if (!ptRes.ok) throw new Error(`/points ${ptRes.status}`);
            const { gridId, gridX, gridY } = (await ptRes.json()).properties;
            console.log(`NDFD grid: ${gridId} ${gridX},${gridY}`);

            const gdRes = await fetch(
              `https://api.weather.gov/gridpoints/${gridId}/${gridX},${gridY}`,
              { headers: { "User-Agent": UA } }
            );
            if (!gdRes.ok) throw new Error(`/gridpoints ${gdRes.status}`);
            const p = (await gdRes.json()).properties;

            console.log("windSpeed uom:", p.windSpeed?.uom);

            const windH = expandSeries(p.windSpeed?.values)
                            .map(x => ({ ...x, value: toMph(x.value, p.windSpeed?.uom) }));
            const gustH = expandSeries(p.windGust?.values)
                            .map(x => ({ ...x, value: toMph(x.value, p.windGust?.uom) }));
            const dirH  = expandSeries(p.windDirection?.values);

            return {
              wind: groupByASTDate(windH),
              gust: groupByASTDate(gustH),
              dir:  groupByASTDate(dirH)
            };
          }

          /* ═══════════════════════════════════════════════════════
           *  SOURCE 2a — NWS Marine Zone Text  (seas + period)
           *
           *  File : fzca52.tjsj.cwf.sju.txt
           *  Zone : AMZ726 — coastal waters east of PR / Vieques
           *
           *  FIX 1: periodRe used \z (Perl/Ruby anchor, invalid in JS).
           *         Replaced with $ and added the 's' (dotAll) flag so
           *         [\s\S]*? can match across newlines without the s flag
           *         being needed — but keeping /gms is safest.
           *
           *  FIX 2: Added console.warn diagnostic when the seas map is
           *         empty so silent failures are immediately visible in
           *         the Actions log.
           * ═══════════════════════════════════════════════════════ */
          async function fetchWaveForecastNWS() {

            const url = "https://tgftp.nws.noaa.gov/data/raw/fz/fzca52.tjsj.cwf.sju.txt";
            const raw = await fetch(url).then(r => r.text());

            // ── extract AMZ726 block ──────────────────────────────
            const zoneStart = raw.indexOf("AMZ726");
            if (zoneStart === -1) throw new Error("AMZ726 block not found");
            const zoneEnd   = raw.indexOf("$$", zoneStart);
            const block     = zoneEnd === -1 ? raw.slice(zoneStart)
                                             : raw.slice(zoneStart, zoneEnd);
            console.log("AMZ726 block preview:\n" + block.slice(0, 300));

            // ── build date map: label → "YYYY-MM-DD" in AST ──────
            const todayMidnight = new Date(astNow);
            todayMidnight.setHours(0, 0, 0, 0);

            const isoKey = d => d.toISOString().slice(0, 10);

            const DOW = ["SUNDAY","MONDAY","TUESDAY","WEDNESDAY",
                         "THURSDAY","FRIDAY","SATURDAY"];

            const labelToDate = {};
            labelToDate["TODAY"]         = isoKey(todayMidnight);
            labelToDate["REST OF TODAY"] = isoKey(todayMidnight);
            labelToDate["TONIGHT"]       = isoKey(todayMidnight);

            for (let i = 0; i < 8; i++) {
              const d    = new Date(todayMidnight.getTime() + i * 86400000);
              const name = DOW[d.getUTCDay()];
              if (!labelToDate[name])              labelToDate[name]              = isoKey(d);
              if (!labelToDate[name + " NIGHT"])   labelToDate[name + " NIGHT"]   = isoKey(d);
            }
            console.log("Label→date map:", labelToDate);

            // ── FIX 1: replaced \z with $ and added 's' flag ─────
            // Old (broken): /gm  with (?=^\.[A-Z]|\z)  — \z is not JS
            // New (fixed):  /gms with (?=^\.[A-Z]|$)   — $ works in /m mode
            const periodRe = /^\.(REST OF TODAY|TODAY|TONIGHT|(?:MONDAY|TUESDAY|WEDNESDAY|THURSDAY|FRIDAY|SATURDAY|SUNDAY)(?: NIGHT)?)\.{3}([\s\S]*?)(?=^\.[A-Z]|$)/gms;

            const seasByDay   = {};
            const periodByDay = {};
            let m;

            while ((m = periodRe.exec(block)) !== null) {
              const label   = m[1].trim().toUpperCase();
              const content = m[2];
              const dateKey = labelToDate[label];
              if (!dateKey) {
                console.log(`No date mapping for label: "${label}"`);
                continue;
              }

              // "Seas 5 to 7 feet." → avg(5,7)
              // "Seas around 6 feet." → 6.0
              const seasMatch = content.match(/Seas?\s+([\d.]+)\s+to\s+([\d.]+)\s+feet/i)
                             || content.match(/Seas?\s+around\s+([\d.]+)\s+feet/i);
              if (seasMatch) {
                const lo  = parseFloat(seasMatch[1]);
                const hi  = seasMatch[2] !== undefined ? parseFloat(seasMatch[2]) : lo;
                const avg = parseFloat(((lo + hi) / 2).toFixed(1));
                (seasByDay[dateKey] = seasByDay[dateKey] || []).push(avg);
                console.log(`  ${label} (${dateKey}): seas ${lo}-${hi}ft → ${avg}ft`);
              } else {
                console.log(`  ${label} (${dateKey}): no seas match in: ${content.slice(0,80)}`);
              }

              const waveMatch = content.match(/Wave Detail[^.]*?at\s+([\d.]+)\s+seconds/i);
              if (waveMatch) {
                const per = parseFloat(waveMatch[1]);
                (periodByDay[dateKey] = periodByDay[dateKey] || []).push(per);
                console.log(`  ${label} (${dateKey}): period ${per}s`);
              }
            }

            // Average day+night entries into single daily value
            const seas   = {};
            const period = {};
            for (const k of Object.keys(seasByDay)) {
              seas[k] = parseFloat(mean(seasByDay[k]).toFixed(1));
            }
            for (const k of Object.keys(periodByDay)) {
              period[k] = parseFloat(mean(periodByDay[k]).toFixed(1));
            }

            // FIX 2: diagnostic warning when NWS parsing yields nothing
            if (Object.keys(seas).length === 0) {
              console.warn("⚠️  NWS seas map is EMPTY — regex matched no period blocks.");
              console.warn("Block sample (first 600 chars):\n" + block.slice(0, 600));
            }

            console.log("NWS parsed seas:", seas);
            console.log("NWS parsed period:", period);
            return { seas, period };
          }

          /* ═══════════════════════════════════════════════════════
           *  SOURCE 2b — Open-Meteo Marine API fallback
           *
           *  Free, JSON, no auth, no regex. Returns wave_height_max
           *  and wave_period_max per day in feet / seconds, already
           *  aligned to America/Puerto_Rico (AST) calendar dates.
           *  Used when NWS parsing yields fewer than 3 days of data.
           * ═══════════════════════════════════════════════════════ */
          async function fetchWaveForecastOpenMeteo() {
            const url =
              "https://marine-api.open-meteo.com/v1/marine" +
              "?latitude=18.33&longitude=-65.65" +
              "&daily=wave_height_max,wave_period_max" +
              "&length_unit=imperial" +           // feet directly
              "&timezone=America%2FPuerto_Rico" + // AST date keys
              "&forecast_days=7";

            const json = await fetch(url).then(r => r.json());
            if (!json.daily) throw new Error("Open-Meteo marine: no daily block");

            const seas   = {};
            const period = {};
            json.daily.time.forEach((dateKey, i) => {
              const h = json.daily.wave_height_max[i];
              const p = json.daily.wave_period_max[i];
              if (h !== null) seas[dateKey]   = parseFloat(h.toFixed(1));
              if (p !== null) period[dateKey] = parseFloat(p.toFixed(1));
            });

            console.log("Open-Meteo seas:", seas);
            console.log("Open-Meteo period:", period);
            return { seas, period };
          }

          /* ── wave orchestrator: NWS primary, Open-Meteo fallback  */
          async function fetchWaveForecast() {
            let result = null;

            try {
              result = await fetchWaveForecastNWS();
            } catch(e) {
              console.warn("NWS wave fetch failed:", e.message);
            }

            // Fall back when NWS yields fewer than 3 days of seas data
            if (!result || Object.keys(result.seas).length < 3) {
              console.warn("⚠️  Falling back to Open-Meteo Marine API for wave data.");
              try {
                result = await fetchWaveForecastOpenMeteo();
              } catch(e) {
                console.error("Open-Meteo fallback also failed:", e.message);
                result = { seas: {}, period: {} };
              }
            }

            return result;
          }

          /* ═══════════════════════════════════════════════════════
           *  MERGE — build unified 7-day array
           * ═══════════════════════════════════════════════════════ */
          async function buildForecast() {
            const [windData, waveData] = await Promise.all([
              fetchWindForecast().catch(e => { console.error("Wind failed:", e.message); return null; }),
              fetchWaveForecast().catch(e => { console.error("Wave failed:", e.message); return null; })
            ]);

            // FIX 3: todayMidnight is constructed from astNow (already AST-shifted).
            // Using .toISOString().slice(0,10) here is correct because the Date object
            // carries the AST wall-clock value as if it were UTC — the slice gives the
            // AST calendar date. This matches what groupByASTDate() produces.
            const todayMidnight = new Date(astNow);
            todayMidnight.setHours(0, 0, 0, 0);

            const rows = [];
            for (let i = 0; i < 7; i++) {
              const d   = new Date(todayMidnight.getTime() + i * 86400000);
              const key = d.toISOString().slice(0, 10);

              const avgWind   = windData?.wind[key]?.length ? Math.round(mean(windData.wind[key])) : null;
              const avgGust   = windData?.gust[key]?.length ? Math.round(mean(windData.gust[key])) : null;
              const avgDir    = windData?.dir[key]?.length  ? Math.round(circularMean(windData.dir[key])) : null;
              const avgSeas   = waveData?.seas[key]   ?? null;
              const avgPeriod = waveData?.period[key] ?? null;

              console.log(`${key}: wind=${avgWind}mph gust=${avgGust}mph dir=${avgDir}° seas=${avgSeas}ft per=${avgPeriod}s`);

              // display date: shift back from AST-midnight to UTC for toLocaleDateString
              rows.push({
                date:   new Date(d.getTime() - astOffset),
                wind:   avgWind,
                gust:   avgGust,
                dir:    avgDir,
                wave:   avgSeas,
                period: avgPeriod
              });
            }
            return rows;
          }

          /* ── draw card ───────────────────────────────────────── */
          async function run() {
            await drawBackground();

            const logo = await loadImage(
              "https://static.wixstatic.com/media/80c250_b1146919dfe046429a96648c59e2c413~mv2.png"
            );
            const title  = "7-Day Nearshore (East of PR) Wind & Wave Forecast";
            ctx.font     = "bold 22px system-ui";
            const tw     = ctx.measureText(title).width;
            const startX = (W - (60 + 16 + tw)) / 2;
            ctx.drawImage(logo, startX, 90, 60, 60);
            ctx.fillStyle = "#1e40af";
            ctx.fillText(title, startX + 76, 130);

            let rows;
            try {
              rows = await buildForecast();
            } catch(err) {
              console.error("buildForecast failed:", err.message);
              rows = Array.from({ length: 7 }, (_, i) => {
                const d = new Date(now.getTime() + i * 86400000);
                return { date: d, wind: 14, gust: 20, dir: 90, wave: 3.5, period: 8 };
              });
            }

            /* table headers */
            const xs = [140, 300, 420, 540, 660, 780];
            ctx.font = "bold 18px system-ui"; ctx.fillStyle = "#334155";
            ["📅 Date","💨 Wind","🌬 Gusts","🧭 Dir","🌊 Seas","⏱ Period"]
              .forEach((h, i) => ctx.fillText(h, xs[i], 260));

            /* table rows */
            let y = 305;
            rows.forEach(row => {
              const label = row.date.toLocaleDateString("en-US",
                { weekday: "short", timeZone: "America/Puerto_Rico" });
              ctx.font = "18px system-ui"; ctx.fillStyle = "#0f172a";
              ctx.fillText(label, xs[0], y);

              const wv = row.wind ?? 0;
              ctx.fillStyle = windColor(wv);
              ctx.fillText(row.wind   != null ? `${row.wind} mph`   : "--", xs[1], y);
              ctx.fillText(row.gust   != null ? `${row.gust} mph`   : "--", xs[2], y);
              ctx.fillStyle = "#0f172a";
              ctx.fillText(row.dir    != null ? compass(row.dir)    : "--", xs[3], y);
              ctx.fillText(row.wave   != null ? `${row.wave} ft`    : "--", xs[4], y);
              ctx.fillText(row.period != null ? `${row.period} s`   : "--", xs[5], y);

              ctx.fillStyle = wv >= 20 ? "#ef4444" : "#22c55e";
              ctx.beginPath(); ctx.arc(xs[5]+90, y-6, 6, 0, Math.PI*2); ctx.fill();
              y += 42;
            });

            /* buoys */
            const [buoy43, buoy56] = await Promise.all([
              fetchBuoy("41043"), fetchBuoy("41056")
            ]);
            const bY=640, bW=720, bH=130, bX=(W-720)/2, cW=360;
            ctx.textAlign = "center";
            ctx.font = "bold 18px system-ui"; ctx.fillStyle = "#1e293b";
            ctx.fillText("📍 NOAA Buoy Observations", W/2, bY-15);

            ctx.fillStyle = "#f8fafc"; ctx.strokeStyle = "#cbd5e1"; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.roundRect(bX, bY, bW, bH, 14); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(bX+cW, bY); ctx.lineTo(bX+cW, bY+bH); ctx.stroke();

            const bColor = h => {
              if (!h) return "#e5e7eb";
              const v = parseFloat(h);
              return v <= 3 ? "#22c55e" : v <= 5 ? "#eab308" : "#ef4444";
            };

            ctx.font = "bold 16px system-ui"; ctx.fillStyle = bColor(buoy43?.height);
            ctx.fillText("41043 – North of PR", bX+cW/2, bY+30);
            ctx.font = "15px system-ui"; ctx.fillStyle = "#0f172a";
            ctx.fillText(`Seas: ${buoy43?.height ?? "--"}`,   bX+cW/2, bY+58);
            ctx.fillText(`Period: ${buoy43?.period ?? "--"}`, bX+cW/2, bY+80);
            ctx.fillText(`Dir: ${buoy43?.dir ?? "--"}`,       bX+cW/2, bY+102);

            ctx.font = "bold 16px system-ui"; ctx.fillStyle = bColor(buoy56?.height);
            ctx.fillText("41056 – Near Vieques", bX+cW+cW/2, bY+30);
            ctx.font = "15px system-ui"; ctx.fillStyle = "#0f172a";
            ctx.fillText(`Seas: ${buoy56?.height ?? "--"}`,   bX+cW+cW/2, bY+58);
            ctx.fillText(`Period: ${buoy56?.period ?? "--"}`, bX+cW+cW/2, bY+80);
            ctx.fillText(`Dir: ${buoy56?.dir ?? "--"}`,       bX+cW+cW/2, bY+102);

            ctx.textAlign = "left";

            ctx.font = "13px system-ui"; ctx.fillStyle = "#94a3b8"; ctx.textAlign = "center";
            ctx.fillText(
              "Wind: NWS NDFD · Seas: NWS Marine AMZ726 (East PR / Vieques) + Open-Meteo fallback",
              W/2, 800
            );
            ctx.font = "16px system-ui"; ctx.fillStyle = "#475569";
            const timeStr = astNow.toLocaleTimeString("en-US",
              { hour: "2-digit", minute: "2-digit" });
            ctx.fillText(`Updated ${timeStr} AST • RabirubiaTech`, W/2, 1010);

            fs.writeFileSync("rabirubia_7day_windwave.png", canvas.toBuffer());
            console.log("✅ Card saved.");
          }

          run().catch(e => { console.error("FATAL:", e); process.exit(1); });
          EOF

          node generate.cjs

      - name: Commit & Push
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add rabirubia_7day_windwave.png
          git diff --staged --quiet || git commit -m "Fix wave forecast: JS regex, Open-Meteo fallback, AST date alignment"
          git push
