name: Update Rabirubia 7-Day Wind & Wave Card

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

concurrency:
  group: rabirubia-forecast
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install canvas node-fetch@2

      - name: Generate Forecast Card
        run: |
          cat > generate.cjs << 'EOF'
          const { createCanvas, loadImage } = require("canvas");
          const fetch = require("node-fetch");
          const fs = require("fs");

          const W = 1080, H = 1080;
          const canvas = createCanvas(W, H);
          const ctx = canvas.getContext("2d");

          // AST = UTC-4
          const now       = new Date();
          const astOffset = -4 * 60 * 60 * 1000;
          const astNow    = new Date(now.getTime() + astOffset);

          /* ── helpers ─────────────────────────────────────────────── */
          const mean = arr => arr.reduce((a,b)=>a+b,0)/arr.length;

          const circularMean = degs => {
            const rad = degs.map(d => d * Math.PI / 180);
            const ang = Math.atan2(
              rad.reduce((a,v)=>a+Math.sin(v),0),
              rad.reduce((a,v)=>a+Math.cos(v),0)
            ) * 180 / Math.PI;
            return (ang + 360) % 360;
          };

          const compass = deg => {
            const d=["N","NNE","NE","ENE","E","ESE","SE","SSE",
                     "S","SSW","SW","WSW","W","WNW","NW","NNW"];
            return d[Math.round(deg/22.5)%16];
          };

          const windColor = s =>
            s<=10?"#38bdf8":s<=15?"#22c55e":s<=20?"#eab308":s<=25?"#f97316":"#ef4444";

          /* ── unit conversion – reads uom returned by NWS ─────────── */
          function toMph(value, uom) {
            if (value === null || value === undefined) return null;
            // uom examples: "wmoUnit:km_h-1"  "wmoUnit:m_s-1"
            //               "wmoUnit:knot"    "wmoUnit:mph"
            const u = (uom || "").toLowerCase();
            if (u.includes("km_h")  || u.includes("km/h")) return Math.round(value * 0.621371);
            if (u.includes("m_s")   || u.includes("m/s"))  return Math.round(value * 2.23694);
            if (u.includes("knot")  || u.includes("kt"))   return Math.round(value * 1.15078);
            if (u.includes("mph"))                          return Math.round(value);
            // fallback – assume km/h (most common for NWS)
            return Math.round(value * 0.621371);
          }

          function toFeet(value, uom) {
            if (value === null || value === undefined) return null;
            const u = (uom || "").toLowerCase();
            if (u.includes("ft") || u.includes("feet")) return parseFloat(value.toFixed(1));
            // assume metres
            return parseFloat((value * 3.28084).toFixed(1));
          }

          /* ── background ──────────────────────────────────────────── */
          async function drawBackground() {
            const bg = await loadImage(
              "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1600&q=80"
            );
            ctx.drawImage(bg, 0, 0, W, H);
            ctx.fillStyle = "rgba(248,250,252,0.92)";
            ctx.fillRect(40, 40, W-80, H-80);
          }

          /* ── buoy fetch ──────────────────────────────────────────── */
          async function fetchBuoy(id) {
            try {
              const txt = await fetch(
                `https://www.ndbc.noaa.gov/data/realtime2/${id}.txt`
              ).then(r => r.text());
              const lines  = txt.split("\n");
              const header = lines.find(l=>l.startsWith("#YY"))
                                  .replace("#","").split(/\s+/);
              const rows   = lines.filter(l=>!l.startsWith("#") && l.trim());
              const idx    = n => header.indexOf(n);
              for (const r of rows) {
                const p = r.split(/\s+/);
                if (p[idx("WVHT")] !== "MM") {
                  return {
                    height: (parseFloat(p[idx("WVHT")]) * 3.28084).toFixed(1) + " ft",
                    period: p[idx("DPD")] + " s",
                    dir:    p[idx("MWD")] + "°"
                  };
                }
              }
            } catch(e) { console.error("Buoy",id,"error:",e.message); }
            return null;
          }

          /* ── expand NWS ISO-8601 duration series → hourly ─────────
           *  validTime format: "2025-03-05T12:00:00+00:00/PT6H"
           * ────────────────────────────────────────────────────────── */
          function expandSeries(values) {
            const out = [];
            if (!values || !values.length) return out;
            for (const { validTime, value } of values) {
              const slash = validTime.lastIndexOf("/");
              const timeStr = validTime.slice(0, slash);
              const durStr  = validTime.slice(slash + 1);
              const dt      = new Date(timeStr);
              // parse PT#H or PT#DT#H
              const hours   = (() => {
                let h = 0;
                const dMatch = durStr.match(/(\d+)D/); if (dMatch) h += parseInt(dMatch[1])*24;
                const hMatch = durStr.match(/(\d+)H/); if (hMatch) h += parseInt(hMatch[1]);
                return h || 1;
              })();
              for (let i = 0; i < hours; i++) {
                out.push({ t: new Date(dt.getTime() + i*3600000), value });
              }
            }
            return out;
          }

          /* ── group hourly points by AST calendar date ─────────────
           *  Returns { "YYYY-MM-DD": [values…] }
           * ────────────────────────────────────────────────────────── */
          function groupByASTDate(hourly) {
            const map = {};
            for (const { t, value } of hourly) {
              if (value === null || value === undefined || isNaN(value)) continue;
              const astDate = new Date(t.getTime() + astOffset);
              const key = astDate.toISOString().slice(0, 10);   // "YYYY-MM-DD"
              (map[key] = map[key] || []).push(value);
            }
            return map;
          }

          /* ── NWS NDFD forecast for Fajardo nearshore ─────────────
           *  Coordinates: 18.3327 N, 65.6516 W  (east coast PR)
           * ────────────────────────────────────────────────────────── */
          async function fetchNWSForecast() {
            const UA = "RabirubiaTech/1.0 (forecast-card; contact@rabirubia.tech)";

            // 1. Resolve grid
            const ptRes = await fetch(
              "https://api.weather.gov/points/18.3327,-65.6516",
              { headers: { "User-Agent": UA } }
            );
            if (!ptRes.ok) throw new Error(`/points ${ptRes.status}: ${await ptRes.text()}`);
            const pt = await ptRes.json();
            const { gridId, gridX, gridY } = pt.properties;
            console.log(`Grid → ${gridId} ${gridX},${gridY}`);

            // 2. Fetch raw grid data
            const gdRes = await fetch(
              `https://api.weather.gov/gridpoints/${gridId}/${gridX},${gridY}`,
              { headers: { "User-Agent": UA } }
            );
            if (!gdRes.ok) throw new Error(`/gridpoints ${gdRes.status}: ${await gdRes.text()}`);
            const gd   = await gdRes.json();
            const p    = gd.properties;

            // Log what wave-related fields are actually present
            const presentWaveKeys = ["waveHeight","wavePeriod","wavePeriod2",
              "waveDirection","windWaveHeight","primarySwellHeight",
              "primarySwellDirection","secondarySwellHeight"]
              .filter(k => p[k]?.values?.length > 0);
            console.log("Present wave keys:", presentWaveKeys);
            console.log("windSpeed uom:", p.windSpeed?.uom);
            console.log("waveHeight uom:", p.waveHeight?.uom);

            // 3. Extract with correct uom-aware conversion
            const windUom  = p.windSpeed?.uom  || "";
            const gustUom  = p.windGust?.uom   || "";
            const waveUom  = p.waveHeight?.uom || "";

            const windH  = expandSeries(p.windSpeed?.values)
                             .map(x=>({...x, value: toMph(x.value, windUom)}));
            const gustH  = expandSeries(p.windGust?.values)
                             .map(x=>({...x, value: toMph(x.value, gustUom)}));
            const dirH   = expandSeries(p.windDirection?.values);

            // waveHeight – try in order of preference
            const rawWave = p.waveHeight?.values?.length   ? p.waveHeight
                          : p.windWaveHeight?.values?.length? p.windWaveHeight
                          : null;
            const wvUom   = rawWave?.uom || "";
            const waveH   = expandSeries(rawWave?.values)
                              .map(x=>({...x, value: toFeet(x.value, wvUom)}));

            // wavePeriod – dominant period preferred
            const rawPer  = p.wavePeriod2?.values?.length ? p.wavePeriod2
                          : p.wavePeriod?.values?.length  ? p.wavePeriod
                          : null;
            const perH    = expandSeries(rawPer?.values);

            console.log(`Wind pts:${windH.length}  Gust:${gustH.length}  Wave:${waveH.length}  Period:${perH.length}`);

            // 4. Group by AST calendar date
            const windDay  = groupByASTDate(windH);
            const gustDay  = groupByASTDate(gustH);
            const dirDay   = groupByASTDate(dirH);
            const waveDay  = groupByASTDate(waveH);
            const perDay   = groupByASTDate(perH);

            // 5. Build 7-day array – anchor = today in AST
            const todayAST = astNow.toISOString().slice(0,10);  // "YYYY-MM-DD"
            const anchor   = new Date(todayAST + "T00:00:00+00:00");

            const rows = [];
            for (let i = 0; i < 7; i++) {
              const dayUTC = new Date(anchor.getTime() + i*86400000);
              // The AST date key: subtract 4h from UTC midnight then format
              const key = new Date(dayUTC.getTime() - astOffset)
                            .toISOString().slice(0,10);
              // Actually since anchor is at UTC midnight and AST=UTC-4,
              // the AST date for UTC midnight = previous calendar day.
              // Correct approach: step through AST dates directly.
              const astDay = new Date(astNow);
              astDay.setUTCHours(0,0,0,0);
              const keyFixed = new Date(astDay.getTime() + i*86400000 - astOffset)
                                 .toISOString().slice(0,10);

              const displayDate = new Date(astNow);
              displayDate.setDate(astNow.getDate() + i);

              const avgWind   = windDay[keyFixed]?.length
                ? Math.round(mean(windDay[keyFixed])) : null;
              const avgGust   = gustDay[keyFixed]?.length
                ? Math.round(mean(gustDay[keyFixed])) : null;
              const avgDir    = dirDay[keyFixed]?.length
                ? Math.round(circularMean(dirDay[keyFixed])) : null;
              const avgWave   = waveDay[keyFixed]?.length
                ? parseFloat(mean(waveDay[keyFixed]).toFixed(1)) : null;
              const avgPer    = perDay[keyFixed]?.length
                ? parseFloat(mean(perDay[keyFixed]).toFixed(1)) : null;

              console.log(`${keyFixed}: wind=${avgWind}mph gust=${avgGust}mph dir=${avgDir}° wave=${avgWave}ft per=${avgPer}s`);
              rows.push({ date: displayDate, wind: avgWind, gust: avgGust,
                          dir: avgDir, wave: avgWave, period: avgPer });
            }
            return rows;
          }

          /* ── main ─────────────────────────────────────────────────── */
          async function run() {
            await drawBackground();

            /* header */
            const logo = await loadImage(
              "https://static.wixstatic.com/media/80c250_b1146919dfe046429a96648c59e2c413~mv2.png"
            );
            const title   = "7-Day Nearshore (East of PR) Wind & Wave Forecast";
            ctx.font      = "bold 22px system-ui";
            const tw      = ctx.measureText(title).width;
            const startX  = (W - (60 + 16 + tw)) / 2;
            ctx.drawImage(logo, startX, 90, 60, 60);
            ctx.fillStyle = "#1e40af";
            ctx.fillText(title, startX + 76, 130);

            /* fetch real forecast */
            let rows;
            try {
              rows = await fetchNWSForecast();
            } catch(err) {
              console.error("NWS fetch failed →", err.message);
              // Flat east-PR climatological fallback (no artificial spike)
              rows = Array.from({length:7},(_,i)=>{
                const d = new Date(astNow); d.setDate(astNow.getDate()+i);
                return { date:d, wind:14, gust:20, dir:90, wave:3.2, period:8 };
              });
            }

            /* table headers */
            const xs = [140, 300, 420, 540, 660, 780];
            ctx.font      = "bold 18px system-ui";
            ctx.fillStyle = "#334155";
            ["📅 Date","💨 Wind","🌬 Gusts","🧭 Dir","🌊 Seas","⏱ Period"]
              .forEach((h,i) => ctx.fillText(h, xs[i], 260));

            /* table rows */
            let y = 305;
            rows.forEach(row => {
              const label = row.date.toLocaleDateString("en-US",
                { weekday:"short", timeZone:"America/Puerto_Rico" });

              ctx.font      = "18px system-ui";
              ctx.fillStyle = "#0f172a";
              ctx.fillText(label, xs[0], y);

              const wv = row.wind ?? 0;
              ctx.fillStyle = windColor(wv);
              ctx.fillText(row.wind   != null ? `${row.wind} mph`   : "--", xs[1], y);
              ctx.fillText(row.gust   != null ? `${row.gust} mph`   : "--", xs[2], y);
              ctx.fillStyle = "#0f172a";
              ctx.fillText(row.dir    != null ? compass(row.dir)    : "--", xs[3], y);
              ctx.fillText(row.wave   != null ? `${row.wave} ft`    : "--", xs[4], y);
              ctx.fillText(row.period != null ? `${row.period} s`   : "--", xs[5], y);

              ctx.fillStyle = wv >= 20 ? "#ef4444" : "#22c55e";
              ctx.beginPath(); ctx.arc(xs[5]+90, y-6, 6, 0, Math.PI*2); ctx.fill();
              y += 42;
            });

            /* buoy section */
            const [buoy43, buoy56] = await Promise.all([
              fetchBuoy("41043"), fetchBuoy("41056")
            ]);

            const bY=640, bW=720, bH=130, bX=(W-720)/2, cW=360;
            ctx.textAlign  = "center";
            ctx.font       = "bold 18px system-ui";
            ctx.fillStyle  = "#1e293b";
            ctx.fillText("📍 NOAA Buoy Observations", W/2, bY-15);

            ctx.fillStyle  = "#f8fafc";
            ctx.strokeStyle= "#cbd5e1";
            ctx.lineWidth  = 2;
            ctx.beginPath(); ctx.roundRect(bX,bY,bW,bH,14); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(bX+cW,bY); ctx.lineTo(bX+cW,bY+bH); ctx.stroke();

            const bColor = h => {
              if (!h) return "#e5e7eb";
              const v = parseFloat(h);
              return v<=3?"#22c55e":v<=5?"#eab308":"#ef4444";
            };

            // Left buoy
            ctx.font="bold 16px system-ui"; ctx.fillStyle=bColor(buoy43?.height);
            ctx.fillText("41043 – North of PR",  bX+cW/2, bY+30);
            ctx.font="15px system-ui"; ctx.fillStyle="#0f172a";
            ctx.fillText(`Seas: ${buoy43?.height??"--"}`,   bX+cW/2, bY+58);
            ctx.fillText(`Period: ${buoy43?.period??"--"}`, bX+cW/2, bY+80);
            ctx.fillText(`Dir: ${buoy43?.dir??"--"}`,       bX+cW/2, bY+102);

            // Right buoy
            ctx.font="bold 16px system-ui"; ctx.fillStyle=bColor(buoy56?.height);
            ctx.fillText("41056 – Near Vieques", bX+cW+cW/2, bY+30);
            ctx.font="15px system-ui"; ctx.fillStyle="#0f172a";
            ctx.fillText(`Seas: ${buoy56?.height??"--"}`,   bX+cW+cW/2, bY+58);
            ctx.fillText(`Period: ${buoy56?.period??"--"}`, bX+cW+cW/2, bY+80);
            ctx.fillText(`Dir: ${buoy56?.dir??"--"}`,       bX+cW+cW/2, bY+102);

            ctx.textAlign = "left";

            /* source + footer */
            ctx.font="13px system-ui"; ctx.fillStyle="#94a3b8"; ctx.textAlign="center";
            ctx.fillText("Forecast: NWS NDFD · Fajardo Nearshore (18.33°N, 65.65°W)", W/2, 800);

            ctx.font="16px system-ui"; ctx.fillStyle="#475569";
            const astStr = astNow.toLocaleTimeString("en-US",
              { hour:"2-digit", minute:"2-digit", timeZone:"America/Puerto_Rico" });
            ctx.fillText(`Updated ${astStr} AST • RabirubiaTech`, W/2, 1010);

            fs.writeFileSync("rabirubia_7day_windwave.png", canvas.toBuffer());
            console.log("✅ Card saved successfully.");
          }

          run().catch(e => { console.error("FATAL:", e); process.exit(1); });
          EOF

          node generate.cjs

      - name: Commit & Push
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add rabirubia_7day_windwave.png
          git diff --staged --quiet || git commit -m "Fix: dynamic uom conversion, correct wave keys, AST date anchor"
          git push
